name: Android UX QA with Emulator

on:
  push:
    branches: [glucodroid]
    # Exclude pure documentation changes
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [glucodroid]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level (smoke, full, extended)'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full
          - extended
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  GRADLE_OPTS: -Xmx6g -XX:+HeapDumpOnOutOfMemoryError

jobs:
  instrumented-tests:
    name: Instrumented UI Tests on Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      matrix:
        api-level: [31, 34]
        arch: [x86_64]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Run emulator and instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          profile: Nexus 6P
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          disk-size: 6000M
          heap-size: 512M
          script: |
            echo "Running instrumented UX tests on API ${{ matrix.api-level }}"

            # Smoke tests - quick validation
            if [ "${{ github.event.inputs.test_level }}" = "smoke" ] || [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
              ./gradlew connectedMobileLibre3SiDexGoogleDebugAndroidTest \
                --no-daemon \
                --warning-mode=all \
                -Pandroid.testInstrumentationRunnerArguments.size=small
              echo "✓ Smoke tests completed"
            fi

            # Full tests
            if [ "${{ github.event.inputs.test_level }}" = "full" ] || [ "${{ github.event.inputs.test_level }}" = "extended" ]; then
              ./gradlew connectedMobileLibre3SiDexGoogleDebugAndroidTest \
                --no-daemon \
                --warning-mode=all
              echo "✓ Full instrumented tests completed"
            fi

            # Extended tests (longer duration)
            if [ "${{ github.event.inputs.test_level }}" = "extended" ]; then
              echo "Running extended soak tests..."
              ./gradlew connectedMobileLibre3SiDexGoogleDebugAndroidTest \
                --no-daemon \
                --warning-mode=all \
                -Pandroid.testInstrumentationRunnerArguments.duration=3600
              echo "✓ Extended tests completed"
            fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}-${{ matrix.arch }}
          path: |
            Common/build/outputs/androidTest-results/
            Common/build/reports/androidTests/connected/
          retention-days: 30

      - name: Upload logcat
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-api${{ matrix.api-level }}-${{ matrix.arch }}
          path: logcat.log
          retention-days: 7

  build-and-smoke-test:
    name: Build APK and Basic Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-build-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK
        run: |
          ./gradlew assembleMobileLibre3SiDexGoogleReleaser \
            -Pno_x86 -Pno_x86_64 \
            --no-daemon \
            --warning-mode=all

      - name: Verify APK was created
        run: |
          APK=$(find Common/build/outputs/apk -name "*.apk" | head -n1)
          if [ -n "$APK" ]; then
            echo "APK build successful"
            ls -lh "$APK"
          else
            echo "APK not found"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glucodroid-release-apk
          path: Common/build/outputs/apk/**/*.apk
          retention-days: 7

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-unit-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run unit tests
        run: |
          ./gradlew testMobileLibre3SiDexGoogleDebugUnitTest \
            --no-daemon \
            --warning-mode=all

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            Common/build/reports/tests/testMobileLibre3SiDexGoogleDebugUnitTest/
            Common/build/test-results/testMobileLibre3SiDexGoogleDebugUnitTest/
          retention-days: 30

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [instrumented-tests, build-and-smoke-test, unit-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.instrumented-tests.result }}" != "success" ] || \
             [ "${{ needs.build-and-smoke-test.result }}" != "success" ] || \
             [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "❌ QA checks failed"
            echo "  - Instrumented tests: ${{ needs.instrumented-tests.result }}"
            echo "  - Build & smoke tests: ${{ needs.build-and-smoke-test.result }}"
            echo "  - Unit tests: ${{ needs.unit-tests.result }}"
            exit 1
          else
            echo "All QA checks passed"
          fi

      - name: Report success
        if: success()
        run: |
          echo "🎉 UX QA workflow completed successfully"
          echo "📊 Test Coverage:"
          echo "  ✓ Instrumented UI tests (API 31, 34)"
          echo "  ✓ Unit tests"
          echo "  ✓ Build verification"
